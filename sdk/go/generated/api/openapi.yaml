openapi: 3.0.0
info:
  contact:
    name: Euler Stream
  description: Sign Server API Documentation
  license:
    name: All Rights Reserved
  title: Euler Stream Sign API
  version: dev
servers:
- description: Public Server (Community & Pro)
  url: https://api.eulerstream.com
- description: Enterprise Server (Enterprise)
  url: https://tiktok.enterprise.eulerstream.com
- description: Staging Server (Private Use)
  url: https://tiktok.staging.eulerstream.com
tags:
- description: Fetch information from the TikTok LIVE Webcast API.
  name: TikTok LIVE
- description: Premium TikTok LIVE routes requiring an additional subscription.
  name: TikTok LIVE Premium
- description: Premium TikTok LIVE routes requiring for stream moderation.
  name: TikTok LIVE Moderation
- description: Public TikTok API signing routes.
  name: TikTok General
- description: "Manage, create, update, and retrieve information about TikTok LIVE\
    \ Creator Alerts."
  name: TikTok LIVE Alerts
- description: "Manage, create, update, and retrieve information about TikTok LIVE\
    \ Creator Alert Targets."
  name: TikTok LIVE Alert Targets
- description: Routes related to TikTok Captchas.
  name: TikTok Captchas
- description: "Manage, create, update, and retrieve information about Sign API Accounts."
  name: Accounts
- description: "Manage, create, update, and retrieve information about Sign API keys."
  name: Authentication
- description: Routes for Sign API analytics and logging.
  name: Analytics
paths:
  /webcast/sign_url:
    post:
      operationId: SignWebcastUrl
      parameters:
      - explode: true
        in: query
        name: client
        required: false
        schema:
          default: ttlive-other
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignTikTokUrlBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignWebcastUrl_200_response"
          description: Ok
      security:
      - api_key_query:
        - PRO
        api_key_header:
        - PRO
      tags:
      - TikTok LIVE
  /webcast/rate_limits:
    get:
      description: Retrieve the rate limits for the provided API key (or the unauthenticated
        limits if no key is provided)
      operationId: GetRateLimits
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRateLimits"
          description: Ok
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE
  /webcast/chat:
    post:
      description: |-
        Requires Premium Routes Addon - Send a chat to a TikTok LIVE room.

        Either `targetRoomId` or `targetUniqueId` must be provided to identify the room.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: SendRoomChat
      parameters:
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendRoomChat_request"
        description: The payload configuration for sending a chat
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastRoomChatRouteResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Premium
  /webcast/user_earnings:
    get:
      description: |-
        Requires Premium Routes Addon - Retrieve TikTok LIVE earnings for a specific user.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveWebcastUserEarnings
      parameters:
      - description: The unique ID (username) of the user to fetch earnings for.
        explode: true
        in: query
        name: unique_id
        required: true
        schema:
          type: string
        style: form
      - description: Earnings period
        explode: true
        in: query
        name: period
        required: false
        schema:
          $ref: "#/components/schemas/WebcastUserEarningsOutputPeriod"
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: session_id
        required: false
        schema:
          type: string
        style: form
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: tt_target_idc
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastUserEarningsResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Premium
  /webcast/rankings:
    get:
      description: |-
        Requires Premium Routes Addon - Retrieve TikTok LIVE rankings for a specific region.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveWebcastRankings
      parameters:
      - description: The region (country) with which to fetch a feed from.
        explode: true
        in: query
        name: region
        required: true
        schema:
          $ref: "#/components/schemas/OxyLabsProxyRegion"
        style: form
      - description: The type of ranking to fetch. See documentation for more details.
        explode: true
        in: query
        name: rank_type
        required: true
        schema:
          enum:
          - FANS_TEAM_RANK
          - DAILY_RANK
          type: string
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: session_id
        required: false
        schema:
          type: string
        style: form
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: tt_target_idc
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastRegionRankingsResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE
  /webcast/fetch:
    get:
      description: |-
        Fetch the WebSocket URL & first payload for a TikTok LIVE Room given a Room ID.

        **Authentication (Optional):** Anonymous access is supported. For authenticated requests, provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: FetchWebcastURL
      parameters:
      - description: The client library identifier. Used for metrics.
        explode: true
        in: query
        name: client
        required: false
        schema:
          default: ttlive-other
          type: string
        style: form
      - description: The room ID to fetch the Webcast URL for.
        explode: true
        in: query
        name: room_id
        required: false
        schema:
          type: string
        style: form
      - description: "The unique ID of the TikTok user. Send this instead of a Room\
          \ ID, if you're an Enterprise user."
        explode: true
        in: query
        name: unique_id
        required: false
        schema:
          type: string
        style: form
      - description: "Starting cursor for the webcast connection, if any"
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Override the user agent used for signing and fetching
        explode: true
        in: query
        name: user_agent
        required: false
        schema:
          type: string
        style: form
      - description: "Whether the client enters a room after connecting, or if it's\
          \ done by query parameters"
        explode: true
        in: query
        name: client_enter
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: Country code to make the request from.
        explode: true
        in: query
        name: country
        required: false
        schema:
          $ref: "#/components/schemas/SoaxProxyRegion"
        style: form
      - description: Platform to connect with
        explode: true
        in: query
        name: platform
        required: false
        schema:
          $ref: "#/components/schemas/WebcastFetchPlatform"
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: session_id
        required: false
        schema:
          type: string
        style: form
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: tt_target_idc
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Uint8Array"
          description: Ok
      security:
      - jwt_key_header:
        - PUBLIC
        api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE
  /webcast/feed:
    get:
      description: Requires Premium Routes Addon - Fetch the TikTok LIVE webcast feed
        for a specific region. Gets a random sampling of creators for a region.
      operationId: RetrieveWebcastFeed
      parameters:
      - description: The region (country) with which to fetch a feed from.
        explode: true
        in: query
        name: region
        required: true
        schema:
          $ref: "#/components/schemas/OxyLabsProxyRegion"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastFeedRouteResponse"
          description: Ok
      security:
      - api_key_query:
        - PRO
        api_key_header:
        - PRO
        jwt_key_header:
        - PRO
      tags:
      - TikTok LIVE Premium
  /webcast/room_video:
    get:
      description: Requires Business Plan - Fetch TikTok LIVE Stream video given a
        uniqueId.
      operationId: RetrieveRoomVideo
      parameters:
      - description: The unique ID of the TikTok to fetch the data for.
        explode: true
        in: query
        name: uniqueId
        required: true
        schema:
          type: string
        style: form
      - description: The type of video stream to fetch. Default is HLS_SD.
        explode: true
        in: query
        name: streamType
        required: false
        schema:
          $ref: "#/components/schemas/StreamType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSONResponse"
          description: Ok
      security:
      - api_key_query:
        - PRO
        api_key_header:
        - PRO
        jwt_key_header:
        - PRO
      tags:
      - TikTok LIVE
  /webcast/room_info:
    get:
      description: Requires Business Plan - Retrieve TikTok Live Room Information
      operationId: RetrieveRoomInfo
      parameters:
      - description: The unique identifier for the TikTok user or room
        explode: true
        in: query
        name: uniqueId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastRoomInfoRouteResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Premium
  /webcast/room_id:
    get:
      description: Requires Business Plan - Fetch Room ID for a given uniqueId & whether
        that user is live.
      operationId: RetrieveRoomId
      parameters:
      - description: The unique ID of the TikTok user to fetch the data for.
        explode: true
        in: query
        name: uniqueId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastRoomIdRouteResponse"
          description: Ok
      security:
      - api_key_query:
        - PRO
        api_key_header:
        - PRO
        jwt_key_header:
        - PRO
      tags:
      - TikTok LIVE
  /webcast/room_cover:
    get:
      description: Requires Business Plan - Fetch TikTok LIVE Stream Cover URL given
        a uniqueId.
      operationId: RetrieveRoomCover
      parameters:
      - description: The unique ID of the TikTok to fetch the cover for.
        explode: true
        in: query
        name: uniqueId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSONResponse"
          description: Ok
      security:
      - api_key_query:
        - PRO
        api_key_header:
        - PRO
        jwt_key_header:
        - PRO
      tags:
      - TikTok LIVE
  /webcast/live_analytics/video_list:
    get:
      description: |-
        Requires Premium Routes Addon - Retrieve the list of past livestreams with analytics for the authenticated user.

        **Note:** The session you attach must own the livestream to check analytics for a given `room_id`.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveLiveAnalyticsVideoList
      parameters:
      - description: "Number of videos to retrieve (default: 10)"
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: 10
          format: double
          type: number
        style: form
      - description: "Pagination offset (default: 0)"
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: double
          type: number
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveAnalyticsVideoListAPIResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Premium
  /webcast/live_analytics/video_detail:
    get:
      description: |-
        Requires Premium Routes Addon - Retrieve detailed analytics for a specific past livestream.

        **Note:** The session you attach must own the livestream to check analytics for a given `room_id`.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveLiveAnalyticsVideoDetail
      parameters:
      - description: The room ID of the livestream to get analytics for
        explode: true
        in: query
        name: room_id
        required: true
        schema:
          type: string
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveAnalyticsVideoDetailAPIResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Premium
  /webcast/hashtag_list:
    get:
      description: Requires Premium Routes Addon - Retrieve the list of available
        hashtags for TikTok LIVE streams.
      operationId: RetrieveHashtagList
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashtagListAPIResponse"
          description: Ok
      security: []
      tags:
      - TikTok LIVE
  /webcast/gift_info:
    get:
      description: Retrieve TikTok Live Room Gift List
      operationId: RetrieveGiftInfo
      parameters:
      - description: The room ID of the TikTok LIVE session
        explode: true
        in: query
        name: room_id
        required: true
        schema:
          type: string
        style: form
      - description: Webcast language for locale-based fields
        explode: true
        in: query
        name: webcast_language
        required: false
        schema:
          default: en
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastGiftInfoRouteResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE
  /webcast/bulk_live_check:
    post:
      description: |-
        Requires Premium Routes Addon - A bulk-check endpoint to determine if a group of TikTok users (up to 50 at once) are live.
        It uses a highly optimized job-based system for checking large numbers of users quickly.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveBulkLiveCheck
      parameters:
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrieveBulkLiveCheck_request"
        description: The body of the request containing user numeric IDs (e.g. 7602356191083907865).
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveBulkLiveCheckResponse"
          description: A JSON response indicating which users are live and their Room
            IDs.
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Premium
  /webcast/moderation/mutes:
    delete:
      description: |-
        Requires Premium Routes Addon - Unmute a user in a livestream room.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: UnmuteRoomUser
      parameters:
      - description: The room ID of the livestream
        explode: true
        in: query
        name: room_id
        required: true
        schema:
          type: string
        style: form
      - description: The user ID to unmute
        explode: true
        in: query
        name: user_id
        required: true
        schema:
          type: string
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomUnmuteUserAPIResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Moderation
    get:
      description: |-
        Requires Premium Routes Addon - Retrieve the list of muted users in a livestream room.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveRoomMutedUsers
      parameters:
      - description: The room ID of the livestream
        explode: true
        in: query
        name: room_id
        required: true
        schema:
          type: string
        style: form
      - description: "Page number for pagination (default: 0)"
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          format: double
          type: number
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomMutedUsersAPIResponse"
          description: Ok
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
