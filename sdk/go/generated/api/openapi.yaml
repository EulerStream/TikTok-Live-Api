  /tiktok/captchas/whirl:
    post:
      description: |-
        The whirl captcha requires two images: the outer image and the inner image.

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/rotate.png" alt="Whirl Captcha Example" width="480" />

        ## Usage

        The solution to the whirl captcha is an angle from 0-360. To use it in the GUI, it must be converted to a slider distance:

        `px = ((sidebar_length - icon_length) * angle) / 360`

        - `sidebar_length` is the width of `.captcha_verify_slide--slidebar`
        - `icon_length` is the width of `.secsdk-captcha-drag-icon`
      operationId: CompleteWhirlCaptcha
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompleteWhirlCaptcha_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhirlCaptchaResponse"
          description: Ok
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
  /tiktok/captchas/shapes:
    post:
      description: |-
        The shapes captcha requires just one image.

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/threed.png" alt="Shapes Captcha Example" width="480" />

        ## Usage

        The solution to the shapes captcha are two points that need to be clicked. To use it in the GUI, convert the proportions to pixel values based on the image size.

        The `points` are returned as `x` and `y` proportions (0-1) of the width and height of the source image.
        The captcha image selector is `.captcha-verify-image`
      operationId: CompleteShapesCaptcha
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompleteShapesCaptcha_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShapesCaptchaResponse"
          description: Ok
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
  /tiktok/captchas/puzzle:
    post:
      description: |-
        The puzzle captcha requires two images

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/puzzle.png" alt="Puzzle Piece Example" width="480" />

        ## Usage

        The solution to the puzzle captcha is the distance to move the slider to fit the puzzle piece into the background.

        The `backgroundImage` is the full background image with the missing piece.
        The `pieceImage` is the small puzzle piece that needs to be fit into the background.

        The captcha image selectors are:
        - Background: `.captcha-verify-image`
        - Piece: `#captcha-verify-image ~ div.cap-absolute > img`

        The solution is the `x` proportion (0-1) of the width of the background image where the piece fits. It is 1:1 with the slider distance proportion.
      operationId: CompletePuzzleCaptcha
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompletePuzzleCaptcha_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuzzleCaptchaResponse"
          description: Ok
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
  /tiktok/captchas/icons:
    post:
      description: |2-

        The icons captcha requires just one image & a prompt string.

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/icon.png" alt="Icons Captcha Example" width="480" />

        ## Usage

        The `prompt` is the text prompt provided by TikTok. The Icon captcha solution is provided as a list of points, where each point marks a location on the image that needs to be clicked.
        These points are expressed as ratios relative to the image's width and height.
        A point of (0.0, 0.0) corresponds to the image’s upper-left corner, while (1.0, 1.0) represents the lower-right corner. For reference, (0.5, 0.5) sits at the exact center.

        The captcha image selector is `.captcha-verify-image`
      operationId: CompleteIconCaptcha
      parameters:
      - description: The prompt string provided by TikTok
        explode: true
        in: query
        name: prompt
        required: true
        schema:
          type: string
        style: form
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompleteIconCaptcha_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IconCaptchaResponse"
          description: Ok
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
