project_name_override: EulerApiSdk
http_timeout: 30
package_version_override: 0.0.2

# NOTE: auth defaults (X-Api-Key header, no prefix) come from the custom
# templates/ dir, passed via --custom-template-path in update.sh / package.json.
# (custom_template_path is a CLI-only flag, not a config-file field.)

class_overrides:
  PartialAvatarUrlStringNicknameStringSecUidStringNumericUidStringSignatureStringIsVerifiedBooleanFollowingNumberFollowersNumber:
    class_name: PartialTikTokUserInfo
    module_name: partial_tiktok_user_info

  PartialSignedUrlStringUserAgentStringBrowserNameStringBrowserVersionStringTokensRecordStringStringRequestHeadersRecordStringStringCookiesRecordStringStringArray:
    class_name: PartialSignedUrlInfo
    module_name: partial_signed_url_info

  PartialStatusNumberIsLiveBooleanIdStringCoverUrlStringTitleStringStartTimeNumberCurrentViewersNumberTotalViewersNumberHlsPullUrlStringFlvPullUrlStringHlsPullUrlLdStringFlvPullUrlLdString:
    class_name: PartialTikTokLiveUserInfo
    module_name: partial_tiktok_live_user_info