        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /tiktok/captchas/puzzle:
    post:
      description: |-
        The puzzle captcha requires two images

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/puzzle.png" alt="Puzzle Piece Example" width="480" />

        ## Usage

        The solution to the puzzle captcha is the distance to move the slider to fit the puzzle piece into the background.

        The `backgroundImage` is the full background image with the missing piece.
        The `pieceImage` is the small puzzle piece that needs to be fit into the background.

        The captcha image selectors are:
        - Background: `.captcha-verify-image`
        - Piece: `#captcha-verify-image ~ div.cap-absolute > img`

        The solution is the `x` proportion (0-1) of the width of the background image where the piece fits. It is 1:1 with the slider distance proportion.
      operationId: CompletePuzzleCaptcha
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompletePuzzleCaptcha_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuzzleCaptchaResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /tiktok/captchas/icons:
    post:
      description: |2-

        The icons captcha requires just one image & a prompt string.

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/icon.png" alt="Icons Captcha Example" width="480" />

        ## Usage

        The `prompt` is the text prompt provided by TikTok. The Icon captcha solution is provided as a list of points, where each point marks a location on the image that needs to be clicked.
        These points are expressed as ratios relative to the image's width and height.
        A point of (0.0, 0.0) corresponds to the image’s upper-left corner, while (1.0, 1.0) represents the lower-right corner. For reference, (0.5, 0.5) sits at the exact center.

        The captcha image selector is `.captcha-verify-image`
      operationId: CompleteIconCaptcha
      parameters:
      - description: The prompt string provided by TikTok
        explode: true
        in: query
        name: prompt
        required: true
        schema:
          type: string
        style: form
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompleteIconCaptcha_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IconCaptchaResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
