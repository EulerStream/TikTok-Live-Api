openapi: 3.0.0
info:
  contact:
    name: Euler Stream
  description: Sign Server API Documentation
  license:
    name: All Rights Reserved
  title: Euler Stream Sign API
  version: dev
servers:
- description: Public Server (Community & Pro)
  url: https://api.eulerstream.com
- description: Enterprise Server (Enterprise)
  url: https://tiktok.enterprise.eulerstream.com
- description: Staging Server (Private Use)
  url: https://tiktok.staging.eulerstream.com
tags:
- description: Fetch information from the TikTok LIVE Webcast API.
  name: TikTok LIVE
- description: Fetch information about a TikTok LIVE room by its room ID.
  name: TikTok LIVE Rooms
- description: Fetch information about a TikTok LIVE anchor (host) by their unique
    ID.
  name: TikTok LIVE Anchors
- description: Fetch the TikTok LIVE gift catalog and individual gift details.
  name: TikTok LIVE Gifts
- description: Premium TikTok LIVE routes for stream moderation.
  name: TikTok LIVE Moderation
- description: Public TikTok API signing routes.
  name: TikTok General
- description: "Manage, create, update, and retrieve information about TikTok LIVE\
    \ Creator Alerts."
  name: TikTok LIVE Alerts
- description: "Manage, create, update, and retrieve information about TikTok LIVE\
    \ Creator Alert Targets."
  name: TikTok LIVE Alert Targets
- description: Routes related to TikTok Captchas.
  name: TikTok Captchas
- description: "Manage, create, update, and retrieve information about Sign API Accounts."
  name: Accounts
- description: "Manage, create, update, and retrieve information about Sign API keys."
  name: Authentication
- description: Routes for Sign API analytics and logging.
  name: Analytics
- description: Manage WebSocket connections and state.
  name: TikTok WebSocket API
paths:
  /webcast/websockets/{account_id}/{websocket_id}:
    get:
      description: Retrieve the currently connected WebSocket clients for your account.
      operationId: RetrieveWebSocketState
      parameters:
      - explode: false
        in: path
        name: account_id
        required: true
        schema:
          format: double
          type: number
        style: simple
      - explode: false
        in: path
        name: websocket_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketRouteResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok WebSocket API
      x-accepts:
      - application/json
  /webcast/websockets/{account_id}:
    get:
      description: Retrieve the currently connected WebSocket clients for your account.
      operationId: GetWebSockets
      parameters:
      - explode: false
        in: path
        name: account_id
        required: true
        schema:
          format: double
          type: number
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketsRouteResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok WebSocket API
      x-accepts:
      - application/json
  /tiktok/sign_url:
    post:
      description: "Sign a non-LIVE TikTok URL. This is NOT available to customers\
        \ in any public package, and access is approved on a case-by-case basis."
      operationId: SignTikTokUrl
      parameters:
      - description: The TikTokLive client making the request
        explode: true
        in: query
        name: client
        required: false
        schema:
          default: ttlive-other
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignTikTokUrlBody"
        description: Config for the signature generation
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignTikTokUrlResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
      security:
      - api_key_query:
        - PRO
        api_key_header:
        - PRO
      tags:
      - TikTok General
      x-content-type: application/json
      x-accepts:
      - application/json
  /webcast/rooms/{room_id}/chat:
    post:
      description: |-
        Send a chat to a TikTok LIVE room.

        Either `targetRoomId` or `targetUniqueId` must be provided to identify the room.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: SendRoomChat
      parameters:
      - description: Room ID
        explode: false
        in: path
        name: room_id
        required: true
        schema:
          type: string
        style: simple
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendRoomChat_request"
        description: The payload configuration for sending a chat
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastRoomChatRouteResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Rooms
      x-premium: "true"
      x-content-type: application/json
      x-accepts:
      - application/json
  /webcast/anchors/{unique_id}/user_id:
    get:
      description: Resolve a TikTok
      operationId: RetrieveWebcastUserId
      parameters:
      - description: The unique ID (handle) of the TikTok user.
        explode: false
        in: path
        name: unique_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastUserIdResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - api_key_query:
        - PRO
        api_key_header:
        - PRO
        jwt_key_header:
        - PRO
      tags:
      - TikTok LIVE Anchors
      x-accepts:
      - application/json
  /webcast/anchors/{unique_id}/earnings:
    get:
      description: |-
        Retrieve TikTok LIVE earnings for a specific user.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveWebcastUserEarnings
      parameters:
      - description: The unique ID (username) of the user to fetch earnings for.
        explode: false
        in: path
        name: unique_id
        required: true
        schema:
          type: string
        style: simple
      - description: Earnings period
        explode: true
        in: query
        name: period
        required: false
        schema:
          $ref: "#/components/schemas/WebcastUserEarningsOutputPeriod"
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: session_id
        required: false
        schema:
          type: string
        style: form
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: tt_target_idc
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastUserEarningsResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - api_key_query:
        - WEBCAST_PREMIUM
        api_key_header:
        - WEBCAST_PREMIUM
      tags:
      - TikTok LIVE Anchors
      x-premium: "true"
      x-accepts:
      - application/json
  /webcast/rooms/{room_id}/connect:
    get:
      description: |-
        Fetch the WebSocket URL & first payload for a TikTok LIVE Room given a Room ID.

        **Authentication (Optional):** Anonymous access is supported. For authenticated requests, provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: FetchWebcastURL
      parameters:
      - description: The client library identifier. Used for metrics.
        explode: true
        in: query
        name: client
        required: false
        schema:
          default: ttlive-other
          type: string
        style: form
      - description: The room ID to fetch the Webcast URL for.
        explode: false
        in: path
        name: room_id
        required: true
        schema:
          type: string
        style: simple
      - description: "The unique ID of the TikTok user. Send this instead of a Room\
          \ ID, if you're an Enterprise user. Pass \"0\" to room_id."
        explode: true
        in: query
        name: unique_id
        required: false
        schema:
          type: string
        style: form
      - description: "Starting cursor for the webcast connection, if any"
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Override the user agent used for signing and fetching
        explode: true
        in: query
        name: user_agent
        required: false
        schema:
          type: string
        style: form
      - description: "Whether the client enters a room after connecting, or if it's\
          \ done by query parameters"
        explode: true
        in: query
        name: client_enter
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: Country code to make the request from.
        explode: true
        in: query
        name: country
        required: false
        schema:
          $ref: "#/components/schemas/PooledProxyRegion"
        style: form
      - description: Platform to connect with
        explode: true
        in: query
        name: platform
        required: false
        schema:
          $ref: "#/components/schemas/WebcastFetchPlatform"
        style: form
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: session_id
        required: false
        schema:
          type: string
        style: form
      - deprecated: true
        description: Use x-oauth-token or x-cookie-header instead
        explode: true
        in: query
        name: tt_target_idc
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/protobuf:
              schema:
                allOf:
                - $ref: "#/components/schemas/Uint8Array"
                nullable: true
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - jwt_key_header:
        - PUBLIC
        api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE Rooms
      x-accepts:
      - application/json
      - application/protobuf
  /webcast/gifts:
    get:
      description: Retrieve Webcast gifts for a given region
      operationId: RetrieveWebcastGifts
      parameters:
      - description: The region to fetch gifts for
        explode: true
        in: query
        name: region
        required: false
        schema:
          $ref: "#/components/schemas/PooledProxyRegion"
        style: form
      - description: Webcast language for locale-based fields
        explode: true
        in: query
        name: webcast_language
        required: false
        schema:
          default: en
          enum:
          - en
          type: string
        style: form
      - description: Whether to redirect directly or return a JSON response
        explode: true
        in: query
        name: redirect
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                - $ref: "#/components/schemas/WebcastGiftsResponse"
                nullable: true
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - jwt_key_header:
        - PUBLIC
        api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE Gifts
      x-accepts:
      - application/json
  /webcast/gifts/catalog:
    get:
      description: |-
        List the full TikTok LIVE gift catalog, paginated.

        This is a special route, it does NOT fetch data live, and therefore does not count to your hourly/daily rate limits.
      operationId: ListWebcastGifts
      parameters:
      - description: "Results per page (1–100, server-clamped). Defaults to 50."
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          default: 50
          format: double
          type: number
        style: form
      - description: 1-based page number. Defaults to 1.
        explode: true
        in: query
        name: pageNumber
        required: false
        schema:
          default: 1
          format: double
          type: number
        style: form
      - description: Sort order for the catalog. Defaults to price ascending.
        explode: true
        in: query
        name: orderBy
        required: false
        schema:
          $ref: "#/components/schemas/GiftCatalogOrderBy"
        style: form
      - description: Whether to sort ascending or descending. Defaults to true.
        explode: true
        in: query
        name: ascending
        required: false
        schema:
          default: true
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastGiftcatalogResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - jwt_key_header:
        - PUBLIC
        api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE Gifts
      x-accepts:
      - application/json
  /webcast/gifts/catalog/{gift_id}:
    get:
      description: |-
        Retrieve a single TikTok LIVE gift by its numeric gift ID.

        This is a special route, it does NOT fetch data live, and therefore does not count to your hourly/daily rate limits.
      operationId: RetrieveWebcastGift
      parameters:
      - description: The numeric gift ID to look up
        explode: false
        in: path
        name: gift_id
        required: true
        schema:
          format: double
          type: number
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastGiftResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - jwt_key_header:
        - PUBLIC
        api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE Gifts
      x-accepts:
      - application/json
  /webcast/gifts/catalog/search:
    post:
      description: |-
        Search the TikTok LIVE gift catalogue by gift name.

        This is a special route, it does NOT fetch data live, and therefore does not count to your hourly/daily rate limits.
      operationId: SearchWebcastGifts
      parameters:
      - description: The search query
        explode: true
        in: query
        name: query
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastGiftSearchResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - jwt_key_header:
        - PUBLIC
        api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE Gifts
      x-accepts:
      - application/json
  /webcast/anchors/{unique_id}/gift_gallery:
    get:
      description: |-
        Retrieve the TikTok LIVE gift gallery (sponsorable gifts + sponsorship
        progress) for a creator.

        The gallery is rendered per-viewer, so a session is required.

        **Authentication:** Provide exactly one of the following headers:
        - `x-oauth-token`: An OAuth access token. The sessionId and ttTargetIdc are resolved from the stored OAuth session. [Read More](https://www.eulerstream.com/docs/oauth)
        - `x-cookie-header`: A cookie header string containing `sessionid` and `tt-target-idc` cookies from TikTok.
      operationId: RetrieveWebcastGiftGallery
      parameters:
      - description: The creator's unique ID (handle).
        explode: false
        in: path
        name: unique_id
        required: true
        schema:
          type: string
        style: simple
      - description: OAuth access token for session resolution
        explode: false
        in: header
        name: x-oauth-token
        required: false
        schema:
          type: string
        style: simple
      - description: Cookie header containing sessionid and tt-target-idc
        explode: false
        in: header
        name: x-cookie-header
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastGiftGalleryResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Service Unavailable
      security:
      - jwt_key_header:
        - PUBLIC
        api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
      tags:
      - TikTok LIVE Anchors
      x-premium: "true"
      x-accepts:
      - application/json
  /webcast/feed:
    get:
      description: Fetch the TikTok LIVE webcast feed for a specific region. Gets
        a random sampling of creators for a region.
      operationId: RetrieveWebcastFeed
      parameters:
      - description: The region (country) with which to fetch a feed from.
        explode: true
        in: query
        name: region
        required: true
        schema:
          $ref: "#/components/schemas/PooledProxyRegion"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebcastFeedRouteResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
