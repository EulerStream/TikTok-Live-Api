  /tiktok/captchas/whirl:
    post:
      description: |-
        The whirl captcha requires two images: the outer image and the inner image.

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/rotate.png" alt="Whirl Captcha Example" width="480" />

        ## Usage

        The solution to the whirl captcha is an angle from 0-360. To use it in the GUI, it must be converted to a slider distance:

        `px = ((sidebar_length - icon_length) * angle) / 360`

        - `sidebar_length` is the width of `.captcha_verify_slide--slidebar`
        - `icon_length` is the width of `.secsdk-captcha-drag-icon`
      operationId: CompleteWhirlCaptcha
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompleteWhirlCaptcha_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhirlCaptchaResponse"
          description: Ok
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Too Many Requests
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveWebSocketState_429_response"
          description: Internal Server Error
      security:
      - api_key_query:
        - PUBLIC
        api_key_header:
        - PUBLIC
        license_key_query:
        - PUBLIC
      tags:
      - TikTok Captchas
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /tiktok/captchas/shapes:
    post:
      description: |-
        The shapes captcha requires just one image.

        ## Example Image
        <img src="https://www.eulerstream.com/_static/captchas/threed.png" alt="Shapes Captcha Example" width="480" />

        ## Usage

        The solution to the shapes captcha are two points that need to be clicked. To use it in the GUI, convert the proportions to pixel values based on the image size.

        The `points` are returned as `x` and `y` proportions (0-1) of the width and height of the source image.
        The captcha image selector is `.captcha-verify-image`
      operationId: CompleteShapesCaptcha
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompleteShapesCaptcha_request"
        required: true
      responses:
