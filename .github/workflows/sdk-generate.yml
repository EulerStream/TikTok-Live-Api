name: Generate SDKs

on:
  workflow_call:
    inputs:
      typescript:
        type: boolean
        default: false
      python:
        type: boolean
        default: false
      csharp:
        type: boolean
        default: false
      java:
        type: boolean
        default: false
      go:
        type: boolean
        default: false
    secrets:
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate-typescript:
    if: ${{ inputs.typescript }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Download spec & generate
        working-directory: sdk/typescript
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://api.eulerstream.com/dashboard/openapi
          python3 "$GITHUB_WORKSPACE/.github/scripts/normalize_spec.py" ./build/openapi.json
          rm -rf ./src/sdk
          npx openapi-generator-cli generate -i ./build/openapi.json -g typescript-axios -o ./src/sdk

      - name: Render client template
        working-directory: sdk/typescript
        run: |
          pnpm install
          npx tsx ./scripts/render-template.ts

      - name: Build
        working-directory: sdk/typescript
        run: pnpm run build

      - name: Test
        working-directory: sdk/typescript
        run: pnpm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-typescript
          path: sdk/typescript

  generate-python:
    if: ${{ inputs.python }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install openapi-python-client poetry

      - name: Generate Python SDK
        working-directory: sdk/python
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://api.eulerstream.com/dashboard/openapi
          python3 "$GITHUB_WORKSPACE/.github/scripts/normalize_spec.py" ./build/openapi.json
          openapi-python-client generate \
            --path ./build/openapi.json \
            --output-path ./ \
            --overwrite \
            --config config.yaml

      - name: Render test manifest
        working-directory: sdk/python
        run: python scripts/render_manifest.py

      # openapi-python-client regenerates pyproject.toml from config.yaml
      # (package_version_override), clobbering the real version. version.txt is the
      # persisted source of truth (outside the regenerated output); pin it back in.
      - name: Pin version from version.txt
        working-directory: sdk/python
        run: poetry version "$(tr -d ' \n' < version.txt)"

      - name: Build
        working-directory: sdk/python
        run: poetry build

      - name: Test
        working-directory: sdk/python
        run: python test/test_basic.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-python
          path: sdk/python

  generate-csharp:
    if: ${{ inputs.csharp }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: sdk/csharp
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://api.eulerstream.com/dashboard/openapi
          python3 "$GITHUB_WORKSPACE/.github/scripts/normalize_spec.py" ./build/openapi.json
          rm -rf ./src/generated
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g csharp -o ./src/generated \
            --additional-properties=packageName=EulerApiSdk,targetFramework=net8.0,nullableReferenceTypes=true

      - name: Fix enum conflicts
        working-directory: sdk/csharp
        run: npx tsx ./scripts/fix-enum-conflicts.ts

      - name: Render client template
        working-directory: sdk/csharp
        run: npx tsx ./scripts/render-template.ts

      - name: Build
        working-directory: sdk/csharp/src
        run: dotnet build -c Release

      - name: Test
        working-directory: sdk/csharp/test
        run: dotnet test -c Release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-csharp
          path: sdk/csharp

  generate-java:
    if: ${{ inputs.java }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: sdk/java
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://api.eulerstream.com/dashboard/openapi
          python3 "$GITHUB_WORKSPACE/.github/scripts/normalize_spec.py" ./build/openapi.json
          rm -rf ./src/generated
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g java -o ./src/generated \
            --additional-properties=groupId=com.eulerstream,artifactId=euler-api-sdk,apiPackage=com.eulerstream.api,modelPackage=com.eulerstream.model,invokerPackage=com.eulerstream

      - name: Render client template
        working-directory: sdk/java
        run: npx tsx ./scripts/render-template.ts

      - name: Patch pom for Maven Central (com.eulerstream)
        working-directory: sdk/java
        run: npx tsx ./scripts/fix-pom.ts

      - name: Build
        working-directory: sdk/java/src/generated
        run: mvn package -DskipTests

      - name: Test
        working-directory: sdk/java/src/generated
        run: mvn test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-java
          path: sdk/java

  generate-go:
    if: ${{ inputs.go }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: sdk/go
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://api.eulerstream.com/dashboard/openapi
          python3 "$GITHUB_WORKSPACE/.github/scripts/normalize_spec.py" ./build/openapi.json
          rm -rf ./generated
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g go -o ./generated \
            --additional-properties=packageName=eulerapi,moduleName=github.com/EulerStream/Euler-Api-Sdk/sdk/go
          rm -f ./generated/go.mod ./generated/go.sum

      - name: Fix enum constant conflicts
        run: npx tsx ./sdk/go/scripts/fix-enum-conflicts.ts

      - name: Render client template
        run: npx tsx ./sdk/go/scripts/render-template.ts

      - name: Build
        working-directory: sdk/go
        run: go build ./...

      - name: Test
        working-directory: sdk/go
        run: go test ./... -v

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-go
          path: sdk/go

  generate-examples:
    if: always()
    needs: [generate-typescript, generate-python, generate-csharp, generate-java, generate-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download spec
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://api.eulerstream.com/dashboard/openapi
          python3 "$GITHUB_WORKSPACE/.github/scripts/normalize_spec.py" ./build/openapi.json

      - name: Generate examples
        working-directory: sdk-examples
        run: npx tsx generate.ts

      - name: Upload examples artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-examples-output
          path: sdk-examples/output/

      - name: Upload examples to R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip install awscli
          aws s3 sync sdk-examples/output/ s3://eulerstream-web/sdk-examples/ \
            --endpoint-url https://f00699f0017e82344b8bed18c38dab38.r2.cloudflarestorage.com
