name: "Release: Generate & Publish SDKs"

on:
  workflow_dispatch:
    inputs:
      typescript_bump:
        description: 'TypeScript version bump — skip to not publish'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: skip
      python_bump:
        description: 'Python version bump — skip to not publish'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: skip
      csharp_bump:
        description: 'C# version bump — skip to not publish'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: skip
      java_bump:
        description: 'Java version bump — skip to not publish'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: skip
      go_bump:
        description: 'Go version bump — skip to not publish'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: skip

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce master branch
        if: github.ref != 'refs/heads/master'
        run: |
          echo "::error::Release must be triggered from the master branch, got ${{ github.ref }}"
          exit 1

  generate:
    needs: check-branch
    uses: ./.github/workflows/sdk-generate.yml
    with:
      typescript: ${{ inputs.typescript_bump != 'skip' }}
      python: ${{ inputs.python_bump != 'skip' }}
      csharp: ${{ inputs.csharp_bump != 'skip' }}
      java: ${{ inputs.java_bump != 'skip' }}
      go: ${{ inputs.go_bump != 'skip' }}
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  # ── TypeScript → npm ──────────────────────────────────────────

  publish-typescript:
    needs: generate
    if: ${{ inputs.typescript_bump != 'skip' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-typescript
          path: sdk/typescript

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11

      - name: Bump version
        working-directory: sdk/typescript
        run: npm version ${{ inputs.typescript_bump }} --no-git-tag-version

      - name: Publish to npm
        working-directory: sdk/typescript
        run: npm publish --provenance --access public

      - name: Upload version file
        uses: actions/upload-artifact@v4
        with:
          name: typescript-version
          path: sdk/typescript/package.json

  # ── Python → PyPI ─────────────────────────────────────────────

  publish-python:
    needs: generate
    if: ${{ inputs.python_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: sdk/python

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install poetry
        run: pip install poetry

      - name: Bump version
        working-directory: sdk/python
        run: |
          CURRENT=$(tr -d ' \n' < version.txt)
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.python_bump }}" in
            patch) PAT=$((PAT+1)) ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          esac
          NEXT="$MAJ.$MIN.$PAT"
          echo "$NEXT" > version.txt
          poetry version "$NEXT"
          echo "Bumped Python version: $CURRENT → $NEXT"

      - name: Publish to PyPI
        working-directory: sdk/python
        run: |
          rm -rf dist
          poetry config pypi-token.pypi ${{ secrets.PYPI_TOKEN }}
          poetry publish --build --no-interaction

      - name: Upload version file
        uses: actions/upload-artifact@v4
        with:
          name: python-version
          path: sdk/python/version.txt

  # ── C# → NuGet ───────────────────────────────────────────────

  publish-csharp:
    needs: generate
    if: ${{ inputs.csharp_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-csharp
          path: sdk/csharp

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Bump version
        working-directory: sdk/csharp/src
        run: |
          CURRENT=$(grep '<Version>' EulerApiSdk.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.csharp_bump }}" in
            patch) PAT=$((PAT+1)) ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          esac
          NEXT="$MAJ.$MIN.$PAT"
          sed -i "s|<Version>$CURRENT</Version>|<Version>$NEXT</Version>|" EulerApiSdk.csproj
          echo "Bumped C# version: $CURRENT → $NEXT"

      - name: Pack & publish to NuGet
        working-directory: sdk/csharp/src
        run: |
          dotnet pack -c Release --no-build -o ./nupkg || dotnet pack -c Release -o ./nupkg
          dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source https://api.nuget.org/v3/index.json

      - name: Upload version file
        uses: actions/upload-artifact@v4
        with:
          name: csharp-version
          path: sdk/csharp/src/EulerApiSdk.csproj

  # ── Java → Maven Central ─────────────────────────────────────

  publish-java:
    needs: generate
    if: ${{ inputs.java_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-java
          path: sdk/java

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Bump version
        working-directory: sdk/java
        run: |
          CURRENT=$(tr -d ' \n' < version.txt)
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.java_bump }}" in
            patch) PAT=$((PAT+1)) ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          esac
          NEXT="$MAJ.$MIN.$PAT"
          echo "$NEXT" > version.txt
          (cd src/generated && mvn -B -q versions:set -DnewVersion="$NEXT" -DgenerateBackupPoms=false)
          echo "Bumped Java version: $CURRENT → $NEXT"

      - name: Publish to Maven Central
        working-directory: sdk/java/src/generated
        run: mvn -B deploy -Psign-artifacts -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Upload version file
        uses: actions/upload-artifact@v4
        with:
          name: java-version
          path: sdk/java/version.txt

  # ── Go → git tag ─────────────────────────────────────────────

  publish-go:
    needs: generate
    if: ${{ inputs.go_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next Go version tag
        id: version
        run: |
          LATEST=$(git tag --list 'sdk/go/v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#sdk/go/v}"
          fi
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.go_bump }}" in
            patch) PAT=$((PAT+1)) ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          esac
          NEXT="$MAJ.$MIN.$PAT"
          echo "tag=sdk/go/v$NEXT" >> $GITHUB_OUTPUT
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "Go version: $CURRENT → $NEXT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Index on Go module proxy
        run: GOPROXY=proxy.golang.org go list -m github.com/EulerStream/TikTok-Live-Api/sdk/go@v${{ steps.version.outputs.version }}

  # ── Commit version bumps back ─────────────────────────────────

  commit-versions:
    needs: [generate, publish-typescript, publish-python, publish-csharp, publish-java, publish-go]
    if: |
      always() && (
        needs.publish-typescript.result == 'success' ||
        needs.publish-python.result == 'success' ||
        needs.publish-csharp.result == 'success' ||
        needs.publish-java.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download TypeScript version
        if: needs.publish-typescript.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: typescript-version
          path: sdk/typescript

      - name: Download Python version
        if: needs.publish-python.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: python-version
          path: sdk/python

      - name: Download C# version
        if: needs.publish-csharp.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: csharp-version
          path: sdk/csharp/src

      - name: Download Java version
        if: needs.publish-java.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: java-version
          path: sdk/java

      - name: Download SDK examples output
        uses: actions/download-artifact@v4
        with:
          name: sdk-examples-output
          path: sdk-examples/output
        continue-on-error: true

      - uses: actions/setup-node@v4
        if: needs.publish-typescript.result == 'success'
        with:
          node-version: '22.22.1'

      - uses: actions/setup-python@v5
        if: needs.publish-python.result == 'success'
        with:
          python-version: '3.12'

      - name: Install poetry
        if: needs.publish-python.result == 'success'
        run: pip install poetry

      - name: Build commit message
        id: msg
        run: |
          PARTS=""
          if [ "${{ needs.publish-typescript.result }}" = "success" ]; then
            TS=$(node -p "require('./sdk/typescript/package.json').version")
            PARTS="typescript@${TS}"
          fi
          if [ "${{ needs.publish-python.result }}" = "success" ]; then
            PY=$(tr -d ' \n' < sdk/python/version.txt)
            [ -n "$PARTS" ] && PARTS="${PARTS}, "
            PARTS="${PARTS}python@${PY}"
          fi
          if [ "${{ needs.publish-csharp.result }}" = "success" ]; then
            CS=$(grep '<Version>' sdk/csharp/src/EulerApiSdk.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
            [ -n "$PARTS" ] && PARTS="${PARTS}, "
            PARTS="${PARTS}csharp@${CS}"
          fi
          if [ "${{ needs.publish-java.result }}" = "success" ]; then
            JV=$(tr -d ' \n' < sdk/java/version.txt)
            [ -n "$PARTS" ] && PARTS="${PARTS}, "
            PARTS="${PARTS}java@${JV}"
          fi
          echo "msg=chore: release ${PARTS} [skip ci]" >> $GITHUB_OUTPUT

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/typescript/package.json sdk/python/version.txt sdk/csharp/src/EulerApiSdk.csproj sdk/java/version.txt 2>/dev/null || true
          git add sdk-examples/output/*.json 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "${{ steps.msg.outputs.msg }}"
          git push
